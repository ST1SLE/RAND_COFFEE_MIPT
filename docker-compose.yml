services:
  db:
    image: ankane/pgvector:v0.5.1
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./migrations/001_enable_vector.sql:/docker-entrypoint-initdb.d/2_vector_migration.sql
      - ./migrations/003_add_interest_matching.sql:/docker-entrypoint-initdb.d/3_interest_matching.sql
      - ./migrations/004_interest_match_reminders.sql:/docker-entrypoint-initdb.d/4_interest_match_reminders.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 3s
      timeout: 3s
      retries: 10

  bot:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db
    command: python src/bot.py --config config/mipt.json

  # НОВЫЙ СЕРВИС: Запускает скрипт один раз и выходит
  seeder:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db
    command: >
      bash -c "
        echo 'Waiting for DB to be ready...';
        sleep 10; # Даем Postgres время на инициализацию
        echo 'Running seeder script...';
        python add_coffee_shops.py;
        echo 'Seeder finished.';
      "
    # 'restart: no' не нужен, т.к. сервис сам завершится после выполнения команды

  # ML Worker: Генерирует эмбеддинги для пользователей
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db
    volumes:
      - model_cache:/root/.cache/torch/sentence_transformers  # Кеш моделей ML (сохраняется между перезапусками)
    command: python src/worker.py --config config/mipt.json

  # Matcher Service: Автоматический мэтчинг пользователей на основе косинусного сходства
  matcher:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
      worker:
        condition: service_started
    env_file:
      - .env
    environment:
      - DB_HOST=db
    command: python src/matcher_service.py --config config/mipt.json

volumes:
  postgres_data:
  model_cache:  # Хранит загруженные ML модели между перезапусками
